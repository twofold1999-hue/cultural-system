name: Build Windows Installer

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y
          $iscc = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Inno Setup 6" -Filter ISCC.exe -ErrorAction SilentlyContinue
          if (-not $iscc) {
            $iscc = Get-ChildItem -Path "${env:ProgramFiles}\Inno Setup 6" -Filter ISCC.exe -ErrorAction SilentlyContinue
          }
          if (-not $iscc) {
            Write-Error "Inno Setup 安装失败，未找到 ISCC.exe"
            exit 1
          }
          Write-Host "Inno Setup 安装成功: $($iscc.FullName)"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install --default-timeout=300 --retries=5 -r requirements.txt

      - name: Build installer
        shell: powershell
        run: python scripts/build.py

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: cultural-system-installer
          path: dist/文化矩阵引擎-Setup.exe
          if-no-files-found: error

      - name: Upload packaged app artifact
        uses: actions/upload-artifact@v4
        with:
          name: cultural-system-portable
          path: dist/文化矩阵引擎/
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/文化矩阵引擎-Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
